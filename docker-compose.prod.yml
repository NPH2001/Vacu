# Production stack — Vacu CMS
# Routes through an EXISTING Traefik instance via an external Docker network.
#
# Prerequisites on the host:
#   1. A Traefik container is already running and attached to a network whose
#      name matches ${TRAEFIK_NETWORK} (default: "traefik").
#   2. That Traefik instance has an HTTPS entrypoint named ${TRAEFIK_ENTRYPOINT}
#      (default: "websecure") and a cert resolver named ${TRAEFIK_CERT_RESOLVER}
#      (default: "letsencrypt").
#   3. A `.env` file (see .env.production.example) is in the same dir.
#
# Usage (image is pulled from the registry, not built locally):
#   docker login registry.tagatechx.com             # once, with pull creds
#   docker compose -f docker-compose.prod.yml --env-file .env pull
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#   docker compose -f docker-compose.prod.yml logs -f app
#
# Notes:
#   - Postgres is internal-only (no host port published).
#   - Uploads + Postgres data persist on named volumes.
#   - Migrations run automatically on every app container start. Seed scripts (admin, baseline content) are one-shots — exec them manually after first deploy.
#   - Build + push from the dev machine: `make release`.

name: vacu

services:
  app:
    image: ${IMAGE_NAME:-registry.tagatechx.com/vacu/app}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-vacu}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/${POSTGRES_DB:-vacu}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET required (32+ random bytes)}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      UPLOADS_DIR: /app/public/uploads
      NODE_ENV: production
      # Canonical origin fallback for security-sensitive links (password reset)
      # when Cài đặt → siteUrl is not set. Never derived from request headers.
      APP_URL: https://${APP_DOMAIN}
    volumes:
      - uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - internal
      - traefik
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_NETWORK:-traefik}
      # router (HTTPS)
      traefik.http.routers.vacu.rule: Host(`${APP_DOMAIN:?APP_DOMAIN required}`)
      traefik.http.routers.vacu.entrypoints: ${TRAEFIK_ENTRYPOINT:-websecure}
      traefik.http.routers.vacu.tls: "true"
      traefik.http.routers.vacu.tls.certresolver: ${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      # service port
      traefik.http.services.vacu.loadbalancer.server.port: "3000"
      # optional HTTP → HTTPS redirect (delete if your Traefik already forces it globally)
      traefik.http.routers.vacu-http.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.vacu-http.entrypoints: ${TRAEFIK_HTTP_ENTRYPOINT:-web}
      traefik.http.routers.vacu-http.middlewares: vacu-redirect
      traefik.http.middlewares.vacu-redirect.redirectscheme.scheme: https
      traefik.http.middlewares.vacu-redirect.redirectscheme.permanent: "true"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vacu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-vacu}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vacu}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    image: ${BACKUP_IMAGE:-registry.tagatechx.com/vacu/backup}:${BACKUP_IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-vacu}
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      PGDATABASE: ${POSTGRES_DB:-vacu}
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 3 * * *}   # daily 03:00 UTC
      RETAIN_DAYS: ${BACKUP_RETAIN:-14}
      BACKUP_ON_START: ${BACKUP_ON_START:-1}
      # Optional off-site copy. Example (S3 via rclone):
      #   POST_BACKUP_CMD: "rclone copy $$BACKUP_DIR s3:my-bucket/vacu"
      POST_BACKUP_CMD: ${POST_BACKUP_CMD:-}
    volumes:
      - uploads:/data/uploads:ro
      - backups:/data/backups
      # Mount an rclone config if POST_BACKUP_CMD uses rclone:
      #   - ./rclone.conf:/root/.config/rclone/rclone.conf:ro
    networks:
      - internal

volumes:
  postgres-data:
  uploads:
  backups:

networks:
  # External network shared with the host's Traefik instance.
  # Name must match the network your Traefik container uses.
  traefik:
    name: ${TRAEFIK_NETWORK:-traefik}
    external: true
  # Internal network for app ↔ postgres only — not reachable from Traefik.
  internal:
    driver: bridge
