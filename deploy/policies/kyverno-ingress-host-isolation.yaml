# Kyverno ClusterPolicy — Ingress host isolation for a shared multi-tenant cluster.
#
# Problem it solves: Kubernetes does NOT enforce host ownership. On a shared
# ingress controller, a hostile/careless tenant can create an Ingress claiming
# another tenant's hostname and hijack or intercept their traffic. This is a
# CLUSTER-ADMIN control (an app chart cannot protect itself from this):
#
#   Rule 1 (host-in-namespace-allowed-domains): each namespace declares the
#          domains it may use via an annotation; hosts must be one of them or a
#          subdomain. A namespace WITHOUT the annotation may not host any Ingress.
#   Rule 2 (no-hostless-ingress): reject a catch-all (host-less) Ingress.
#   Rule 3 (host-must-be-globally-unique): reject a host already claimed by an
#          Ingress in a different namespace.
#
# This annotation model (vs a rigid "<ns>.<base>" convention) lets a namespace
# own an arbitrary apex/vanity domain like vacu.com.vn.
#
# ── Declare a namespace's allowed domains ────────────────────────────────────
#   kubectl annotate namespace vacu \
#     platform.example.com/allowed-domains=vacu.com.vn
#   # multiple, comma-separated:  =vacu.com.vn,shop.vacu.com.vn
#   # then ns "vacu" may use vacu.com.vn and *.vacu.com.vn (and shop.vacu.com.vn …)
#
# ── Before applying ──────────────────────────────────────────────────────────
#  1. (optional) rename the annotation key `platform.example.com/allowed-domains`
#     to your platform's prefix — change it in BOTH the apiCall and this comment.
#  2. Annotate every tenant namespace with its domains (see above). Namespaces
#     without the annotation can't create hosted Ingresses.
#  3. Tune the `exclude` namespaces to where shared/system ingresses live.
#  4. Roll out as Audit first (validationFailureAction: Audit), inspect
#     `kubectl get clusterpolicyreport,policyreport -A`, fix violations, THEN
#     switch to Enforce.
#  5. Validate the templating BEFORE trusting it — NOT run against a live Kyverno
#     here (JMESPath/substitution is fiddly):
#        kyverno apply kyverno-ingress-host-isolation.yaml \
#          --resource test-ingress.yaml --values-file values.yaml --policy-report
#
# Requires Kyverno >= 1.11 (operations[], apiCall context, split/ends_with).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: ingress-host-isolation
  annotations:
    policies.kyverno.io/title: Ingress host isolation (multi-tenancy)
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Ingress
    policies.kyverno.io/description: >-
      Stops one tenant from hijacking another tenant's HTTP(S) traffic through a
      shared ingress controller: each namespace declares its allowed domains via
      annotation, hosts must match, and a host may not be used by two namespaces.
spec:
  # Start as Audit; flip to Enforce once PolicyReports are clean.
  validationFailureAction: Enforce
  background: true
  rules:
    # ── Rule 1: host must be under a domain the namespace is allowed to use ───
    - name: host-in-namespace-allowed-domains
      match:
        any:
          - resources:
              kinds: [Ingress]
              operations: [CREATE, UPDATE]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - ingress-nginx
                - cattle-system
                - cattle-fleet-system
      context:
        # Comma-separated allowed domains from the namespace annotation ('' if none).
        - name: allowedRaw
          apiCall:
            urlPath: "/api/v1/namespaces/{{ request.namespace }}"
            jmesPath: "metadata.annotations.\"platform.example.com/allowed-domains\" || ''"
        # As a trimmed list. Empty annotation -> [''] which matches no real host.
        - name: allowedDomains
          variable:
            jmesPath: "split(allowedRaw, ',')"
            default: [""]
      validate:
        message: >-
          Ingress host is not permitted for this namespace. Allowed domains
          (namespace annotation platform.example.com/allowed-domains): {{ allowedRaw }}
          — a host must equal one of them or be a subdomain of it.
        foreach:
          - list: "request.object.spec.rules || `[]`"
            deny:
              conditions:
                all:
                  # Deny when NO allowed domain matches the host (exact or subdomain).
                  # element.host is substituted in as a literal so the filter can
                  # compare each allowed domain (@) against it.
                  - key: >-
                      {{ length(allowedDomains[?trim(@) == '{{ element.host || 'no-host' }}'
                         || ends_with('{{ element.host || 'no-host' }}', join('', ['.', trim(@)]))]) }}
                    operator: Equals
                    value: 0

    # ── Rule 2: reject a catch-all (host-less) Ingress ───────────────────────
    - name: no-hostless-ingress
      match:
        any:
          - resources:
              kinds: [Ingress]
              operations: [CREATE, UPDATE]
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - ingress-nginx
                - cattle-system
                - cattle-fleet-system
      validate:
        message: "A host-less (catch-all) Ingress is not allowed in a tenant namespace."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.rules[?host == null] | length(@) }}"
                operator: GreaterThan
                value: 0
              - key: "{{ length(request.object.spec.rules || `[]`) }}"
                operator: Equals
                value: 0

    # ── Rule 3: a host may not already be claimed by another namespace ───────
    - name: host-must-be-globally-unique
      match:
        any:
          - resources:
              kinds: [Ingress]
              operations: [CREATE, UPDATE]
      context:
        - name: otherHosts
          apiCall:
            urlPath: "/apis/networking.k8s.io/v1/ingresses"
            jmesPath: "items[?metadata.namespace != '{{ request.namespace }}'].spec.rules[].host"
      validate:
        message: >-
          One or more of these hosts is already used by an Ingress in another
          namespace. Pick a hostname under your own domain.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.rules[].host }}"
                operator: AnyIn
                value: "{{ otherHosts }}"
---
# Kyverno needs to READ namespaces (Rule 1's apiCall) and LIST ingresses
# cluster-wide (Rule 3's apiCall). Aggregation labels pull this into Kyverno's
# controller ClusterRoles (>= 1.11).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:view-ingresses-namespaces
  labels:
    app.kubernetes.io/part-of: kyverno
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
    rbac.kyverno.io/aggregate-to-background-controller: "true"
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
# ─────────────────────────────────────────────────────────────────────────────
# Guard: the whole model above is only safe if a TENANT cannot set the
# allowed-domains annotation on their own namespace (else they'd self-authorize
# another tenant's domain). Kubernetes already blocks this for tenants confined
# to namespaced RBAC (Namespace is cluster-scoped), but some platforms (e.g.
# Rancher "Project Owner") can edit namespace metadata — so lock it explicitly:
# only allow-listed admin identities may add/change/remove the annotation.
#
# ── Before applying ──────────────────────────────────────────────────────────
#  * Replace the identities below with YOUR platform admins AND the automation
#    that provisions namespaces (its ServiceAccount username, e.g.
#    system:serviceaccount:fleet-system:gitjob) — otherwise legitimate namespace
#    creation that carries the annotation will be blocked.
#  * background: false is required — request.userInfo only exists at admission.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-allowed-domains-annotation
  annotations:
    policies.kyverno.io/title: Lock the ingress allowed-domains annotation
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Namespace
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: only-admins-change-allowed-domains
      match:
        any:
          - resources:
              kinds: [Namespace]
              operations: [CREATE, UPDATE]
      preconditions:
        all:
          # Fire only when the annotation's value actually changes (set/edit/clear).
          - key: "{{ request.object.metadata.annotations.\"platform.example.com/allowed-domains\" || '' }}"
            operator: NotEquals
            value: "{{ request.oldObject.metadata.annotations.\"platform.example.com/allowed-domains\" || '' }}"
      validate:
        message: >-
          Only platform admins may set/modify the
          platform.example.com/allowed-domains annotation on a namespace.
        deny:
          conditions:
            all:
              # Deny when the requester is NOT in an admin group ...
              - key: "{{ request.userInfo.groups || `[]` }}"
                operator: AllNotIn
                value:
                  - "system:masters"
                  - "platform:admins"          # <-- your admin group
              # ... AND not an allow-listed admin/automation identity.
              - key: "{{ request.userInfo.username }}"
                operator: AnyNotIn
                value:
                  - "kubernetes-admin"          # <-- your admin user(s)
                  - "system:serviceaccount:fleet-system:gitjob"  # <-- your namespace provisioner
