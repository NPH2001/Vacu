# Rancher Continuous Delivery (Fleet) bundle — pulls the Helm chart FROM GHCR
# instead of bundling it from git. This directory holds only this file, so the
# git bundle Fleet creates is ~1 KB: the repo's heavy assets (public/ images,
# ~3.6 MB) can never end up in the bundle and trip the 3 MiB Kubernetes request
# limit ("Request entity too large: limit is 3145728").
#
# Register in Rancher → Continuous Delivery → Git Repos with
#   Path: deploy/fleet
# and a target cluster/group. Fleet installs/upgrades on every git change.
#
# The chart is published to GHCR as an OCI artifact by
# .github/workflows/publish-chart.yml (tag `chart-v<version>`). Make that GHCR
# package PUBLIC (Packages → vacu → Package settings → Change visibility), or set
# `helmSecretName` on the Rancher GitRepo to a Secret holding a GHCR
# username + read:packages token so Fleet can pull a private chart.
#
# Secrets are NOT in git: create the `vacu-env` Secret in the target namespace
# (DATABASE_URL + AUTH_SECRET) — see deploy/README.md — referenced below.

defaultNamespace: vacu

helm:
  releaseName: vacu
  # Remote OCI chart. Keep `version` in sync with deploy/helm/vacu/Chart.yaml —
  # the publish workflow packages that chart and pushes it here.
  chart: oci://ghcr.io/nph2001/charts/vacu
  version: "0.1.0"
  # Adopt resources that already exist in the namespace (e.g. a chart installed
  # by hand before Fleet took over) instead of failing on an ownership conflict.
  takeOwnership: true
  values:
    image:
      # Pin the released tag. Bump on each release (or let CI update it — see
      # deploy/README.md). Avoid `latest` in GitOps so rollbacks are precise.
      # NOTE: docker/metadata-action strips the leading "v" — a GitHub Release
      # tagged `v1.0.0` publishes the image as `1.0.0`, so pin without the "v".
      tag: "1.0.0"
      pullPolicy: IfNotPresent
    # imagePullSecrets: [{ name: ghcr-creds }]   # if the GHCR image is private

    secret:
      existingSecret: vacu-env   # you create this in the vacu namespace

    config:
      APP_URL: https://vacu.example.com

    ingress:
      enabled: true
      className: ""              # e.g. nginx / traefik
      hosts:
        - host: vacu.example.com
          paths:
            - path: /
              pathType: Prefix

    persistence:
      enabled: true
      size: 5Gi
      # storageClass: ""         # set to your cluster's RWO class

# Per-cluster/-environment overrides (optional). Match clusters by label in the
# Rancher GitRepo target, then override values here.
# targetCustomizations:
#   - name: staging
#     clusterSelector:
#       matchLabels: { env: staging }
#     helm:
#       values:
#         image: { tag: "main" }
#         config: { APP_URL: https://staging.vacu.example.com }
#         ingress: { hosts: [{ host: staging.vacu.example.com, paths: [{ path: /, pathType: Prefix }] }] }
