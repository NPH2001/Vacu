{{- if not .Values.secret.existingSecret }}
{{- if not .Values.secret.data.AUTH_SECRET }}
{{- fail "secret.data.AUTH_SECRET is required (32+ chars) — or set secret.existingSecret to a Secret you manage." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vacu.secretName" . }}
  labels:
    {{- include "vacu.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secret.data }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
{{- end }}
