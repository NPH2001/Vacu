# -- Number of app replicas. Note: uploads use a ReadWriteOnce PVC by default,
# so >1 replica needs a ReadWriteMany storage class (or move uploads to object
# storage). See persistence below.
replicaCount: 1

image:
  repository: ghcr.io/nph2001/vacu
  # Overrides Chart.appVersion. Pin to a released tag in production.
  tag: ""
  pullPolicy: IfNotPresent

# Secret(s) for pulling a private GHCR image, e.g. [{ name: ghcr-creds }].
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ---------------------------------------------------------------------------
# Secrets. The app needs DATABASE_URL and AUTH_SECRET (>=32 chars).
# Preferred: create a Secret yourself and set existingSecret. Otherwise the
# chart creates one from `secret.data` below (fine for a quick start, but the
# values then live in your release — use a sealed/external secret in prod).
# ---------------------------------------------------------------------------
secret:
  # Name of an existing Secret to use instead of creating one. It must contain
  # the keys listed in `secret.data` that your app requires.
  existingSecret: ""
  data:
    DATABASE_URL: "" # REQUIRED — the chart fails to render if left blank
    AUTH_SECRET: "" # REQUIRED, 32+ random chars (openssl rand -base64 48)
    # Optional — only used by the manual seed-admin script, not at runtime.
    ADMIN_EMAIL: ""
    ADMIN_PASSWORD: ""

# Non-secret environment. UPLOADS_DIR/PORT/NODE_ENV are already baked into the
# image; APP_URL is the canonical origin fallback for password-reset links.
config:
  APP_URL: "https://vacu.com.vn"
  # Number of trusted proxies in front of the app, used to pick the real client
  # IP from X-Forwarded-For for rate limiting. 1 = a single ingress (e.g.
  # Traefik). Increase (e.g. "2") if a CDN also fronts the app, or the limiter
  # can be bypassed by a spoofed XFF.
  TRUSTED_PROXY_HOPS: "1"

# Extra env vars (list of {name, value} or {name, valueFrom}).
extraEnv: []

# ---------------------------------------------------------------------------
# Database migrations run in an initContainer before the app container starts,
# so the app itself just serves. The migration is idempotent; keep replicaCount
# at 1 (with the Recreate strategy) so two pods never migrate concurrently.
# ---------------------------------------------------------------------------
migrations:
  enabled: true

# Command for the app container. With migrations.enabled the initContainer
# handles migrating, so the app only serves. Set to [] to fall back to the
# image's default CMD (migrate + serve) — use that if you disable migrations.
command: ["node", "server.js"]

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: vacu.com.vn
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: vacu-tls
  #   hosts: [vacu.com.vn]

# Persistent uploads (product/farmer images written to /app/public/uploads).
persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 768Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75

# Probes hit /api/health (checks the process AND the external DB).
livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3
readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

podAnnotations: {}
podSecurityContext:
  fsGroup: 1001
securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true   # writable paths are mounted as emptyDir (see deployment.yaml)
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
