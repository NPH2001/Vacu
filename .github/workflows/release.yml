name: Release image

# Builds the app image and pushes it to GitHub Container Registry (ghcr.io)
# whenever a GitHub Release is published. A manual run is also available for
# rebuilding a specific tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag to publish (optional, e.g. v1.2.3)"
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: release-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a full commit SHA (not a mutable tag):
      # this job holds packages:write, so a retagged/compromised action could
      # otherwise push a poisoned image to GHCR. Bump the SHAs deliberately.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          # ghcr.io/<owner>/<repo> (auto-lowercased), e.g. ghcr.io/nph2001/vacu
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event.inputs.tag != '' }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Publish a signed build provenance attestation + SBOM so consumers can
          # verify the image's origin and scan its declared contents.
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        # Pass the tags through env, not direct ${{ }} interpolation into the
        # shell — an attacker-influenced tag containing $(…)/backticks would
        # otherwise execute in this run block (script injection).
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          echo "### Pushed image" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$IMAGE_TAGS" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
